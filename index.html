<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pronóstico Interactivo Bolsa Audición y Lenguaje 2025-26</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        .chart-container {
            position: relative;
            width: 100%;
            height: 300px;
        }
        @media (min-width: 768px) {
            .chart-container {
                height: 350px;
            }
        }
        .result-card {
            background: linear-gradient(135deg, #ef9a9a, #d32f2f);
        }
    </style>
</head>
<body class="bg-red-50 text-[#333]">

    <main class="container mx-auto p-4 md:p-8 max-w-6xl">

        <header class="text-center mb-8">
            <h1 class="text-3xl md:text-4xl font-bold text-red-900 mb-2">Pronóstico Personalizado para Aspirantes</h1>
            <p class="text-md text-red-700">Bolsa de Audición y Lenguaje - Andalucía 2025/26</p>
        </header>

        <div class="bg-white rounded-2xl shadow-md p-6 mb-8">
            <h2 class="text-xl font-bold text-red-900 mb-4">Introduce tus datos para la simulación</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 max-w-lg mx-auto">
                <div>
                    <label for="bolsaPos" class="block text-sm font-medium text-gray-700">Tu posición en bolsa</label>
                    <input type="number" id="bolsaPos" value="600" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm p-2">
                </div>
                <div>
                    <label for="vacantesAgosto" class="block text-sm font-medium text-gray-700">Vacantes informatizadas (Agosto)</label>
                    <input type="number" id="vacantesAgosto" value="265" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-red-500 focus:ring-red-500 sm:text-sm p-2">
                </div>
            </div>
            <div class="mt-6 text-center">
                <button id="calculateBtn" class="bg-red-600 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition-colors">
                    Calcular Pronóstico
                </button>
            </div>
        </div>

        <div id="resultsBlock" class="hidden">
             <div id="resultText" class="text-center mb-8 p-6 rounded-2xl shadow-lg text-white result-card">
                 </div>
             <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                 <div class="bg-white rounded-2xl shadow-md p-6">
                     <h3 class="text-lg font-bold text-red-900 mb-2 text-center">Avance Acumulado de la Bolsa</h3>
                     <div class="chart-container">
                         <canvas id="cumulativeChart"></canvas>
                     </div>
                 </div>
                 <div class="bg-white rounded-2xl shadow-md p-6">
                     <h3 class="text-lg font-bold text-red-900 mb-2 text-center">Llamamientos Estimados por Mes</h3>
                     <div class="chart-container">
                         <canvas id="monthlyCallsChart"></canvas>
                     </div>
                 </div>
             </div>
        </div>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DATOS BASE PARA AUDICIÓN Y LENGUAJE ---
            const LLAMAMIENTOS_MENSUALES = {
                'Sept': 325, 'Oct': 70, 'Nov': 50, 'Dic': 5,
                'Ene': 110, 'Feb': 15, 'Mar': 25, 'Abr': 12, 'May': 12, 'Jun': 3
            };
            const MESES = Object.keys(LLAMAMIENTOS_MENSUALES);
            
            const CALENDARIO_SIPRI = [
                { mes: 'Sept', dia: 'Jueves 4', incorporacion: 'Miércoles 10 Sep' }, { mes: 'Sept', dia: 'Martes 9', incorporacion: 'Lunes 15 Sep' }, { mes: 'Sept', dia: 'Jueves 11', incorporacion: 'Miércoles 17 Sep' }, { mes: 'Sept', dia: 'Martes 16', incorporacion: 'Lunes 22 Sep' }, { mes: 'Sept', dia: 'Jueves 18', incorporacion: 'Miércoles 24 Sep' }, { mes: 'Sept', dia: 'Martes 23', incorporacion: 'Lunes 29 Sep' }, { mes: 'Sept', dia: 'Jueves 25', incorporacion: 'Miércoles 1 Oct' }, { mes: 'Sept', dia: 'Martes 30', incorporacion: 'Lunes 6 Oct' },
                { mes: 'Oct', dia: 'Jueves 2', incorporacion: 'Miércoles 8 Oct' }, { mes: 'Oct', dia: 'Martes 7', incorporacion: 'Martes 14 Oct' }, { mes: 'Oct', dia: 'Jueves 9', incorporacion: 'Miércoles 15 Oct' }, { mes: 'Oct', dia: 'Martes 14', incorporacion: 'Lunes 20 Oct' }, { mes: 'Oct', dia: 'Jueves 16', incorporacion: 'Miércoles 22 Oct' }, { mes: 'Oct', dia: 'Martes 21', incorporacion: 'Lunes 27 Oct' }, { mes: 'Oct', dia: 'Jueves 23', incorporacion: 'Miércoles 29 Oct' }, { mes: 'Oct', dia: 'Martes 28', incorporacion: 'Lunes 3 Nov' }, { mes: 'Oct', dia: 'Jueves 30', incorporacion: 'Miércoles 5 Nov' },
                { mes: 'Nov', dia: 'Martes 4', incorporacion: 'Lunes 10 Nov' }, { mes: 'Nov', dia: 'Jueves 6', incorporacion: 'Miércoles 12 Nov' }, { mes: 'Nov', dia: 'Martes 11', incorporacion: 'Lunes 17 Nov' }, { mes: 'Nov', dia: 'Jueves 13', incorporacion: 'Miércoles 19 Nov' }, { mes: 'Nov', dia: 'Martes 18', incorporacion: 'Lunes 24 Nov' }, { mes: 'Nov', dia: 'Jueves 20', incorporacion: 'Miércoles 26 Nov' }, { mes: 'Nov', dia: 'Martes 25', incorporacion: 'Lunes 1 Dic' }, { mes: 'Nov', dia: 'Jueves 27', incorporacion: 'Miércoles 3 Dic' },
                { mes: 'Dic', dia: 'Martes 2', incorporacion: 'Martes 9 Dic' }, { mes: 'Dic', dia: 'Jueves 4', incorporacion: 'Miércoles 10 Dic' }, { mes: 'Dic', dia: 'Martes 9', incorporacion: 'Lunes 15 Dic' }, { mes: 'Dic', dia: 'Jueves 11', incorporacion: 'Miércoles 17 Dic' },
                { mes: 'Ene', dia: 'Jueves 8', incorporacion: 'Miércoles 14 Ene' }, { mes: 'Ene', dia: 'Martes 13', incorporacion: 'Lunes 19 Ene' }, { mes: 'Ene', dia: 'Jueves 15', incorporacion: 'Miércoles 21 Ene' }, { mes: 'Ene', dia: 'Martes 20', incorporacion: 'Lunes 26 Ene' }, { mes: 'Ene', dia: 'Jueves 22', incorporacion: 'Miércoles 28 Ene' }, { mes: 'Ene', dia: 'Martes 27', incorporacion: 'Lunes 2 Feb' }, { mes: 'Ene', dia: 'Jueves 29', incorporacion: 'Miércoles 4 Feb' },
                { mes: 'Feb', dia: 'Martes 3', incorporacion: 'Lunes 9 Feb' }, { mes: 'Feb', dia: 'Jueves 5', incorporacion: 'Miércoles 11 Feb' }, { mes: 'Feb', dia: 'Martes 10', incorporacion: 'Lunes 16 Feb' }, { mes: 'Feb', dia: 'Jueves 12', incorporacion: 'Miércoles 18 Feb' }, { mes: 'Feb', dia: 'Martes 17', incorporacion: 'Lunes 23 Feb' }, { mes: 'Feb', dia: 'Jueves 19', incorporacion: 'Miércoles 25 Feb' }, { mes: 'Feb', dia: 'Martes 24', incorporacion: 'Lunes 2 Mar' }, { mes: 'Feb', dia: 'Jueves 26', incorporacion: 'Miércoles 4 Mar' },
                { mes: 'Mar', dia: 'Martes 3', incorporacion: 'Lunes 9 Mar' }, { mes: 'Mar', dia: 'Jueves 5', incorporacion: 'Miércoles 11 Mar' }, { mes: 'Mar', dia: 'Martes 10', incorporacion: 'Lunes 16 Mar' }, { mes: 'Mar', dia: 'Jueves 12', incorporacion: 'Miércoles 18 Mar' }, { mes: 'Mar', dia: 'Martes 17', incorporacion: 'Lunes 23 Mar' }, { mes: 'Mar', dia: 'Jueves 19', incorporacion: 'Miércoles 25 Mar' }, { mes: 'Mar', dia: 'Martes 24', incorporacion: 'Lunes 6 Abr' },
                { mes: 'Abr', dia: 'Martes 7', incorporacion: 'Lunes 13 Abr' }, { mes: 'Abr', dia: 'Jueves 9', incorporacion: 'Miércoles 15 Abr' }, { mes: 'Abr', dia: 'Martes 14', incorporacion: 'Lunes 20 Abr' }, { mes: 'Abr', dia: 'Jueves 16', incorporacion: 'Miércoles 22 Abr' }, { mes: 'Abr', dia: 'Martes 21', incorporacion: 'Lunes 27 Abr' }, { mes: 'Abr', dia: 'Jueves 23', incorporacion: 'Miércoles 29 Abr' }, { mes: 'Abr', dia: 'Martes 28', incorporacion: 'Lunes 4 May' }, { mes: 'Abr', dia: 'Jueves 30', incorporacion: 'Miércoles 6 May' },
                { mes: 'May', dia: 'Martes 5', incorporacion: 'Lunes 11 May' }, { mes: 'May', dia: 'Jueves 7', incorporacion: 'Miércoles 13 May' }, { mes: 'May', dia: 'Martes 12', incorporacion: 'Lunes 18 May' }, { mes: 'May', dia: 'Jueves 14', incorporacion: 'Miércoles 20 May' }, { mes: 'May', dia: 'Martes 19', incorporacion: 'Lunes 25 May' }, { mes: 'May', dia: 'Jueves 21', incorporacion: 'Miércoles 27 May' }, { mes: 'May', dia: 'Martes 26', incorporacion: 'Lunes 1 Jun' }, { mes: 'May', dia: 'Jueves 28', incorporacion: 'Miércoles 3 Jun' },
                { mes: 'Jun', dia: 'Martes 2', incorporacion: 'Lunes 8 Jun' }, { mes: 'Jun', dia: 'Jueves 4', incorporacion: 'Miércoles 10 Jun' },
            ];

            // --- PLUGIN PERSONALIZADO PARA DIBUJAR LA LÍNEA Y ETIQUETA ---
            const verticalLinePlugin = {
                id: 'verticalLinePlugin',
                afterDatasetsDraw: (chart) => {
                    const intersection = chart.options.plugins.verticalLinePlugin.intersection;
                    if (!intersection || !intersection.label) {
                        return;
                    }

                    const ctx = chart.ctx;
                    const xAxis = chart.scales.x;
                    const yAxis = chart.scales.y;

                    const xCoord = xAxis.getPixelForValue(intersection.xIndex);
                    const yTop = yAxis.getPixelForValue(intersection.yValue);
                    const yBottom = yAxis.bottom;

                    ctx.save();
                    
                    ctx.beginPath();
                    ctx.moveTo(xCoord, yTop);
                    ctx.lineTo(xCoord, yBottom);
                    ctx.lineWidth = 2;
                    ctx.strokeStyle = '#b91c1c'; 
                    ctx.setLineDash([6, 6]); 
                    ctx.stroke();

                    ctx.fillStyle = '#b91c1c';
                    ctx.font = 'bold 12px Inter';
                    ctx.textAlign = 'center';
                    ctx.fillText(intersection.label, xCoord, yTop - 10);

                    ctx.restore();
                }
            };

            // --- LÓGICA DE GRÁFICOS ---
            let cumulativeChart, monthlyCallsChart;

            function createCharts() {
                const cumulativeCtx = document.getElementById('cumulativeChart').getContext('2d');
                cumulativeChart = new Chart(cumulativeCtx, { 
                    type: 'line', 
                    data: { labels: [], datasets: [] },
                    options: getChartOptions('Posiciones avanzadas'),
                    plugins: [verticalLinePlugin] 
                });

                const monthlyCtx = document.getElementById('monthlyCallsChart').getContext('2d');
                monthlyCallsChart = new Chart(monthlyCtx, { 
                    type: 'bar', 
                    data: { labels: MESES, datasets: [] }, 
                    options: getChartOptions('Nº de llamamientos') 
                });
            }

            function getChartOptions(yAxisTitle) {
                return {
                    responsive: true,
                    maintainAspectRatio: false,
                    interaction: {
                        mode: 'index',
                        intersect: false,
                    },
                    plugins: { 
                        legend: { display: true, position: 'bottom' },
                        verticalLinePlugin: {
                            intersection: null
                        },
                        tooltip: {
                            backgroundColor: 'rgba(0, 0, 0, 0.8)',
                            titleFont: { weight: 'bold' },
                            bodyFont: { family: 'Inter' },
                            padding: 10,
                            callbacks: {
                                label: function(context) {
                                    const datasetLabel = context.dataset.label || '';
                                    const value = context.parsed.y;
                                    
                                    if (context.datasetIndex === 0) {
                                        const data = context.dataset.data;
                                        const previousValue = context.dataIndex > 0 ? data[context.dataIndex - 1] : 0;
                                        const monthlyCalls = value - previousValue;
                                        const label1 = ` Acumulado: ${value}`;
                                        const label2 = context.dataIndex === 0 ? ` Asignadas: ${monthlyCalls}` : ` Nuevas: ${monthlyCalls}`;
                                        return [label1, label2];
                                    }
                                    
                                    if (context.datasetIndex === 1) {
                                        return ` ${datasetLabel}: ${value}`;
                                    }
                                    return `${datasetLabel}: ${value}`;
                                }
                            }
                        }
                    },
                    scales: {
                        y: { beginAtZero: true, title: { display: true, text: yAxisTitle, color: '#b91c1c' } },
                        x: { ticks: { color: '#333' } }
                    }
                };
            }

            // --- LÓGICA DE CÁLCULO ---
            function calculateForecast(posicion, vacantes) {
                if (posicion <= vacantes) {
                    return { tipo: 'verano' };
                }

                let llamamientosAcumulados = vacantes;
                for (let i = 0; i < MESES.length; i++) {
                    const mes = MESES[i];
                    const llamamientosMes = LLAMAMIENTOS_MENSUALES[mes];
                    
                    if (llamamientosAcumulados + llamamientosMes >= posicion) {
                        const restante = posicion - llamamientosAcumulados;
                        const proporcionMes = llamamientosMes > 0 ? restante / llamamientosMes : 0;
                        const semana = Math.ceil(proporcionMes * 4);
                        const fraccionDelMesPorSemana = (semana - 0.5) / 4;
                        const xIndex = (i + 1) + fraccionDelMesPorSemana;

                        let specificCall = null;
                        const callsInMonth = CALENDARIO_SIPRI.filter(c => c.mes === mes);
                        if (callsInMonth.length > 0) {
                            const callIndex = Math.min(Math.floor(proporcionMes * callsInMonth.length), callsInMonth.length - 1);
                            specificCall = callsInMonth[callIndex];
                        }

                        return { tipo: 'especifico', semana: `Semana ${Math.max(1, semana)}`, call: specificCall, mes: mes, mesIndex: i, xIndex: xIndex };
                    }
                    llamamientosAcumulados += llamamientosMes;
                }

                return { tipo: 'siguiente_curso' };
            }

            // --- LÓGICA DE ACTUALIZACIÓN DE UI ---
            function updateUI(resultado, posicion, vacantes) {
                document.getElementById('resultsBlock').classList.remove('hidden');
                
                const resultTextEl = document.getElementById('resultText');
                switch(resultado.tipo) {
                    case 'verano':
                        resultTextEl.innerHTML = `<p class="text-3xl font-bold">¡Adjudicación en Verano!</p><p class="text-lg mt-2 opacity-90">Con tu posición (${posicion}), es muy probable que obtengas una de las ${vacantes} vacantes informatizadas.</p>`;
                        break;
                    case 'siguiente_curso':
                        resultTextEl.innerHTML = `<p class="text-3xl font-bold">No se estima llamada este curso.</p><p class="text-lg mt-2 opacity-90">Tu posición (${posicion}) supera los llamamientos totales previstos.</p>`;
                        break;
                    case 'especifico':
                        const call = resultado.call;
                        resultTextEl.innerHTML = `
                            <p class="text-3xl font-bold">Estimación: ${resultado.semana} de ${resultado.mes}</p>
                            ${call ? `<div class="mt-2 text-xl">
                                <p>Llamamiento SIPRI: <strong>${call.dia}</strong></p>
                                <p>Incorporación prevista: <strong>${call.incorporacion}</strong></p>
                            </div>` : ''}
                        `;
                        break;
                }

                if (!cumulativeChart) createCharts();
                
                const labelsParaGrafica = ['Vac. Informatizadas', ...MESES];
                
                let acumulado = vacantes;
                const avanceGeneralAcumulado = [vacantes, ...MESES.map(mes => {
                    acumulado += LLAMAMIENTOS_MENSUALES[mes];
                    return acumulado;
                })];

                const posicionUsuarioData = new Array(labelsParaGrafica.length).fill(posicion > 0 ? posicion : null);

                if (resultado.tipo === 'especifico' && resultado.xIndex !== null) {
                    cumulativeChart.options.plugins.verticalLinePlugin.intersection = {
                        xIndex: resultado.xIndex,
                        yValue: posicion,
                        label: resultado.semana
                    };
                } else {
                    cumulativeChart.options.plugins.verticalLinePlugin.intersection = null;
                }
                
                cumulativeChart.data.labels = labelsParaGrafica;
                cumulativeChart.data.datasets = [
                    {
                        label: 'Avance Acumulado de la Bolsa',
                        data: avanceGeneralAcumulado,
                        borderColor: '#d32f2f',
                        backgroundColor: 'rgba(211, 47, 47, 0.2)',
                        fill: true,
                        tension: 0.2,
                        pointRadius: 2,
                        pointHoverRadius: 6
                    },
                    {
                        label: 'Tu Posición en Bolsa',
                        data: posicionUsuarioData,
                        borderColor: '#7f1d1d',
                        borderDash: [5, 5],
                        backgroundColor: 'transparent',
                        pointRadius: 0,
                        tension: 0.1
                    }
                ];
                cumulativeChart.update();

                const coloresBarras = MESES.map((_, index) => index === resultado.mesIndex ? '#7f1d1d' : '#fca5a5');
                monthlyCallsChart.data.datasets = [{
                    label: 'Llamamientos Mensuales',
                    data: Object.values(LLAMAMIENTOS_MENSUALES),
                    backgroundColor: coloresBarras,
                    borderRadius: 4
                }];
                monthlyCallsChart.update();
            }

            // --- INICIALIZACIÓN Y EVENTOS ---
            document.getElementById('calculateBtn').addEventListener('click', () => {
                const posicion = parseInt(document.getElementById('bolsaPos').value) || 0;
                const vacantes = parseInt(document.getElementById('vacantesAgosto').value) || 0;
                
                const resultado = calculateForecast(posicion, vacantes);
                updateUI(resultado, posicion, vacantes);
            });
            
            createCharts();
            document.getElementById('calculateBtn').click();
        });
    </script>
</body>
</html>
